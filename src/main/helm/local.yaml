app:
  replicas: 2
  routing:
    enabled: true
    type: traefik
    default_url: localhost
    bff: true
    hostName: onecx-notification-bff.localhost
  # Extra env vars injected into the Deployment
  # POD_IP is used by Vert.x as the cluster host via application.properties
  extraEnv:
    - name: POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
  # Headless Service for Hazelcast DNS Lookup discovery.
  # Rendered via templates/hazelcast-service.yaml
  hazelcast:
    enabled: true
    serviceName: onecx-notification-bff-hazelcast
  env:
    JAVA_OPTS: "-Dvertx.hazelcast.config=/deployments/hazelcast-k8s.xml -Dhazelcast.config=/deployments/hazelcast-k8s.xml"
    QUARKUS_OTEL_SDK_DISABLED: "true"
    KEYCLOAK_TOKEN_URL: https://onecx-infra-keycloak-dev.dev.one-cx.org/token
    KEYCLOAK_URL: https://onecx-infra-keycloak-dev.dev.one-cx.org/
    KEYCLOAK_REALM: onecx
    MP_JWT_VERIFY_ISSUER: https://onecx-infra-keycloak-dev.dev.one-cx.org/realms/onecx
    MP_JWT_VERIFY_PUBLICKEY_LOCATION: https://onecx-infra-keycloak-dev.dev.one-cx.org/realms/onecx/protocol/openid-connect/certs
    QUARKUS_OIDC_AUTH_SERVER_URL: https://onecx-infra-keycloak-dev.dev.one-cx.org/realms/onecx
    TKIT_LOG_JSON_ENABLED: 'false'
    TKIT_SECURITY_AUTH_ENABLED: 'false'
    ONECX_PERMISSIONS_ALLOW_ALL: 'true'
    ONECX_PERMISSIONS_ENABLED: 'false'
    A: xxxxxxxxxxxXXxxxxxxxxxxUUxxFFxxxxxxxxxxxfffdssslllllyyyaasaxs
  image:
    tag: 999-SNAPSHOT
    registry: "localhost-registry:5000"
    repository: "localhost/onecx-notification-bff"
    pull: Always
  operator:
    microservice:
      enabled: false
    permission:
      enabled: false
    mgmt:
      enabled: false
    microfrontend:
      enabled: false
    keycloak:
      client:
        enabled: false